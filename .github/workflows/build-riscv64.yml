name: Build riscv64 wheel

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0'

jobs:
  build:
    runs-on: ubuntu-24.04-riscv
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libffi-dev

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Build wheel
        run: |
          uvx --python 3.14 pip wheel --no-deps --wheel-dir /tmp/wheels/ .

      - name: Verify platform tag
        run: |
          ls /tmp/wheels/*.whl
          for whl in /tmp/wheels/*.whl; do
            if echo "$whl" | grep -q "linux_riscv64\|manylinux.*riscv64"; then
              echo "OK: $whl"
            else
              echo "FAIL: $whl does not have riscv64 platform tag"
              exit 1
            fi
          done

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-riscv64
          path: /tmp/wheels/*.whl
          retention-days: 90
